apiVersion: v1
kind: Secret
metadata:
  name: claude-pan-proxy-secrets
  namespace: default
  labels:
    app: claude-pan-proxy
type: Opaque
stringData:
  # ---------------------------------------------------------------
  # Fill in all values here before running: kubectl apply -f secret.yaml
  # Better practice: use an external secrets manager (Vault, AWS Secrets Manager, etc.)
  # ---------------------------------------------------------------

  # Anthropic API key — console.anthropic.com > API Keys
  ANTHROPIC_API_KEY: "sk-ant-YOUR_KEY_HERE"

  # Palo Alto Networks AI Runtime Security API key
  PAN_API_KEY: "YOUR_PAN_API_KEY_HERE"

  # Prisma AIRS security profile name (must exist in your PAN tenant)
  PAN_PROFILE_NAME: "YOUR_AIRS_PROFILE_NAME_HERE"
