apiVersion: v1
kind: Service
metadata:
  name: claude-pan-proxy
  namespace: claude-pan-airs
  labels:
    app: claude-pan-proxy
  annotations:
    # AWS Load Balancer annotations (optional - customize as needed)
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"  # Network Load Balancer (faster, recommended)
    # service.beta.kubernetes.io/aws-load-balancer-type: "external"  # Use for ALB with AWS Load Balancer Controller
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"  # or "internal" for private LB
    # service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
    # service.beta.kubernetes.io/aws-load-balancer-ssl-cert: "arn:aws:acm:region:account:certificate/cert-id"  # For HTTPS
    # service.beta.kubernetes.io/aws-load-balancer-ssl-ports: "443"
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: claude-pan-proxy
